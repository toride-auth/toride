version: "1"

actors:
  User:
    attributes:
      id: string
      email: string
      department: string
      isSuperAdmin: boolean

global_roles:
  superadmin:
    actor_type: User
    when:
      $actor.isSuperAdmin: true

resources:
  Project:
    roles: [viewer, editor, admin]
    permissions: [read, update, delete, create_task]

    grants:
      viewer: [read]
      editor: [read, update, create_task]
      admin: [all]

    derived_roles:
      # Superadmin gets admin role on all projects
      - role: admin
        from_global_role: superadmin

      # Users in the same department get editor role (attribute-based)
      - role: editor
        actor_type: User
        when:
          $actor.department:
            eq: $resource.department

      # Direct role assignments from the RoleAssignment table:
      # The project resolver includes viewer_ids, editor_ids, admin_ids
      # arrays containing user IDs for each role. These derived_roles entries
      # check if the actor's ID is in the appropriate array.
      - role: viewer
        when:
          $actor.id:
            in: $resource.viewer_ids

      - role: editor
        when:
          $actor.id:
            in: $resource.editor_ids

      - role: admin
        when:
          $actor.id:
            in: $resource.admin_ids

    rules:
      - effect: forbid
        permissions: [read, update, delete, create_task]
        when:
          $resource.archived: true

  Task:
    roles: [viewer, editor]
    permissions: [read, update, delete]

    relations:
      project: Project
      assignee: User

    grants:
      viewer: [read]
      editor: [read, update, delete]

    derived_roles:
      - role: editor
        from_role: editor
        on_relation: project

      - role: viewer
        from_role: viewer
        on_relation: project

      - role: editor
        from_relation: assignee

    rules:
      - effect: forbid
        permissions: [update, delete]
        when:
          $resource.project.archived: true
