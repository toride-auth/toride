# Workflow: Code Implementation with Parallel Review
#
# Flow: plan -> implement -> review (3 parallel reviewers) -> finalize -> end
#       └──────────────────────────┘ (loop on REJECTED)

name: code-implementation
description: Standard code implementation workflow with parallel review and PR creation

steps:
  # Step 1: Planning phase
  - name: plan
    agent: general-purpose
    prompt: |
      Analyze the task and create an implementation plan.

      Start by reading the spec directory referenced in the task description.
      Load all available design documents:
      - plan.md (tech stack, architecture, file structure)
      - spec.md (user stories with priorities)
      - data-model.md (entities and relationships)
      - contracts/ (interface contracts)
      - research.md (technical decisions)
      - quickstart.md (integration scenarios)

      Then consider:
      - Architecture and design decisions
      - Files that need to be created or modified
      - Potential risks and edge cases
      - Testing strategy
      - If the task includes test sub-tasks, plan for TDD (tests written and failing before implementation)

      IMPORTANT: End your response with exactly one of:
      - PLANNED if the plan is ready
      - BLOCKED if there are unresolved questions requiring human input
    report:
      name: plan
      format: |
        ## Implementation Plan

        ### Overview
        Brief description of approach...

        ### Files to Modify
        - path/to/file.ts - Description of changes

        ### Design Decisions
        - Decision 1: Rationale...

        ### Risks
        - Risk 1: Mitigation...

        ### Testing Strategy
        - Test approach...
      validation: "PLANNED|BLOCKED"
    next: implement
    conditions:
      - keyword: BLOCKED
        goto: plan

  # Step 2: Implementation phase
  - name: implement
    agent: general-purpose
    prompt: |
      Implement the task according to the plan in reports/plan.md.

      If review feedback exists in reports/review.md, address ALL findings
      from every reviewer (code quality, security, and performance).

      Requirements:
      - Follow project coding standards
      - Follow TDD: if the task includes test sub-tasks, write tests FIRST
        and verify they FAIL before writing the implementation
      - Handle edge cases identified in the plan
      - Address all review feedback if this is a re-implementation

      Progress tracking:
      - The task description contains sub-tasks from the spec (T001, T002, etc.)
      - After completing each sub-task, mark it as done [X] in the
        corresponding tasks.md file in the spec directory
      - Commit after each sub-task or logical group of sub-tasks

      IMPORTANT: End your response with exactly one of:
      - DONE if implementation is complete
      - ERROR if you encountered an unrecoverable issue
    report:
      name: implementation
      format: |
        ## Implementation Summary

        ### Changes Made
        - Description of change 1
        - Description of change 2

        ### Files Modified
        - path/to/file.ts - What was changed

        ### Tests Added
        - test/file.test.ts - What is tested

        ### Review Feedback Addressed
        - Feedback item - How it was resolved

        ### Sub-tasks Completed
        - T0XX - Description

        ### Notes
        Any additional context...
      validation: "DONE|ERROR"
    next: review
    conditions:
      - keyword: ERROR
        goto: implement

  # Step 3: Parallel review phase (3 concurrent reviewers)
  - name: review
    parallel:
      - agent: general-purpose
        prompt: |
          You are the CODE QUALITY reviewer. Review the implementation in
          reports/implementation.md focusing exclusively on:

          - Code quality, readability, and maintainability
          - Test coverage and correctness
          - Error handling and edge cases
          - API design and naming conventions
          - Code duplication and abstraction quality
          - Adherence to project coding standards

          Reference the plan in reports/plan.md for context.

          IMPORTANT: End your response with exactly one of:
          - APPROVED if the code quality meets standards
          - REJECTED with specific feedback if changes are needed

      - agent: general-purpose
        prompt: |
          You are the SECURITY reviewer. Review the implementation in
          reports/implementation.md focusing exclusively on:

          - OWASP Top 10 vulnerabilities
          - Input validation and sanitization
          - Authentication and authorization flaws
          - Injection attacks (SQL, command, XSS, etc.)
          - Sensitive data exposure
          - Insecure deserialization
          - Dependency vulnerabilities
          - Secrets or credentials in code

          Reference the plan in reports/plan.md for context.

          IMPORTANT: End your response with exactly one of:
          - APPROVED if no security issues were found
          - REJECTED with specific security findings if issues exist

      - agent: general-purpose
        prompt: |
          You are the PERFORMANCE reviewer. Review the implementation in
          reports/implementation.md focusing exclusively on:

          - Algorithmic complexity (time and space)
          - Unnecessary allocations or copies
          - N+1 query patterns or redundant I/O
          - Missing caching opportunities
          - Memory leaks or unbounded growth
          - Blocking operations in hot paths
          - Bundle size impact

          Reference the plan in reports/plan.md for context.

          IMPORTANT: End your response with exactly one of:
          - APPROVED if no performance concerns were found
          - REJECTED with specific optimization recommendations
    check: all
    report:
      name: review
      format: |
        ## Review Results

        ### Code Quality Review
        **Status:** APPROVED | REJECTED
        - Finding 1
        - Finding 2

        ### Security Review
        **Status:** APPROVED | REJECTED
        - Finding 1
        - Finding 2

        ### Performance Review
        **Status:** APPROVED | REJECTED
        - Finding 1
        - Finding 2

        ### Summary
        Overall assessment...
      validation: "APPROVED|REJECTED"
    next: finalize
    conditions:
      - keyword: APPROVED
        goto: finalize
      - keyword: REJECTED
        goto: implement

  # Step 4: Finalization - cleanup and PR creation
  - name: finalize
    agent: general-purpose
    prompt: |
      Finalize the implementation and create a pull request:

      1. Clean up the code:
         - Remove any TODO comments
         - Ensure documentation is complete
         - Verify all tests pass
         - Clean up debug code

      2. Create a pull request:
         - Commit all changes with a descriptive message
         - Push the branch to the remote
         - Create a PR using `gh pr create` with a clear title and summary
         - Include a summary of changes, test plan, and review results

      Reference:
      - reports/plan.md for original requirements
      - reports/implementation.md for what was built
      - reports/review.md for review feedback

      IMPORTANT: End your response with exactly one of:
      - FINALIZED if everything is complete and the PR is created
      - TASK_DONE if the task was already complete (include justification)
    report:
      name: finalization
      format: |
        ## Finalization Complete

        ### Cleanup Performed
        - Removed TODOs
        - Updated documentation

        ### Final Checklist
        - [ ] All tests passing
        - [ ] No debug code
        - [ ] Documentation complete

        ### Pull Request
        - PR URL: <url>
        - Title: <title>
        - Summary of changes

        ### Summary
        Brief summary of completed work...
      validation: "FINALIZED|TASK_DONE"
    end: true
