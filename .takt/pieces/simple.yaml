name: simple
description: Lightweight pipeline — implement → review → fix loop → finalize with PR creation
max_movements: 10
initial_movement: implement

piece_config:
  provider_options:
    codex: { network_access: true }
    opencode: { network_access: true }
    claude: { sandbox: { allow_unsandboxed_commands: true } }

# --- Section Maps ---

personas:
  coder: ../facets/personas/coder.md
  code-quality-reviewer: ../facets/personas/code-quality-reviewer.md
  finalizer: ../facets/personas/finalizer.md

instructions:
  implement: ../facets/instructions/implement.md
  review-general: ../facets/instructions/review-general.md
  fix: ../facets/instructions/fix.md
  finalize: ../facets/instructions/finalize.md

report_formats:
  implementation: ../facets/output-contracts/implementation-report.md

# --- Movements ---

movements:
  # 1. Implementation (OpenCode / opencode/minimax-m2.5-free)
  - name: implement
    persona: coder
    instruction: implement
    edit: true
    required_permission_mode: edit
    provider: opencode
    model: opencode/minimax-m2.5-free
    output_contracts:
      report:
        - name: implementation.md
          format: implementation
    rules:
      - condition: "Implementation complete"
        next: review
      - condition: "Unrecoverable error"
        next: ABORT

  # 2. Review (Codex / gpt-5.4, reasoning_effort=high from ~/.codex/config.toml)
  - name: review
    persona: code-quality-reviewer
    instruction: review-general
    edit: false
    provider: codex
    model: gpt-5.4
    rules:
      - condition: "Implementation is acceptable"
        next: finalize
      - condition: "Changes needed"
        next: fix

  # 3. Fix (OpenCode / opencode/minimax-m2.5-free)
  - name: fix
    persona: coder
    instruction: fix
    edit: true
    required_permission_mode: edit
    provider: opencode
    model: opencode/minimax-m2.5-free
    rules:
      - condition: "Fixes applied"
        next: review

  # 4. Finalize (Claude)
  - name: finalize
    persona: finalizer
    instruction: finalize
    edit: true
    required_permission_mode: full
    provider: claude
    rules:
      - condition: "PR created successfully"
        next: COMPLETE
      - condition: "Error during finalization"
        next: ABORT

# --- Loop Monitors ---

loop_monitors:
  - cycle: [review, fix]
    threshold: 3
    judge:
      persona: coder
      instruction: |
        The review ↔ fix loop has repeated {cycle_count} times.
        Evaluate whether meaningful progress is being made.
      rules:
        - condition: "Progress is being made, continue"
          next: fix
        - condition: "No progress, abort"
          next: ABORT
