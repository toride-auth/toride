# =============================================================================
# Per-worktree app service (minimum mode).
#
# No Traefik routing, no shared network. Each worktree container is independent.
# Access your app via VS Code's automatic port forwarding.
#
# To upgrade to full mode (Traefik subdomain routing, shared infra, custom
# network), re-run the installer without --minimum.
#
# DO NOT EDIT the volume mounts — they are part of the devcontainer-wt
# template engine (git worktree fix).
#
# CUSTOMIZE: Add shared build cache volumes (see commented examples at bottom).
# =============================================================================

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    tty: true
    container_name: "app-${PROJECT_NAME}-${WORKTREE_NAME}"

    # -------------------------------------------------------------------------
    # DO NOT EDIT — devcontainer-wt core volume mounts
    # -------------------------------------------------------------------------
    volumes:
      # Mount the worktree at the conventional /workspaces path
      - ${LOCAL_WORKSPACE_FOLDER}:/workspaces/${WORKTREE_NAME}:cached
      # Mount the git common directory so the symlink target exists
      - ${GIT_COMMON_DIR}:/workspaces/${MAIN_REPO_NAME}/.git:rw

    # -------------------------------------------------------------------------
    # DO NOT EDIT — devcontainer-wt metadata labels (used by orphan detection)
    # -------------------------------------------------------------------------
    labels:
      - "devcontainer-wt=true"
      - "devcontainer-wt.project=${PROJECT_NAME}"
      - "devcontainer-wt.worktree=${WORKTREE_NAME}"
      - "devcontainer-wt.worktree-dir=${LOCAL_WORKSPACE_FOLDER}"
      - "devcontainer-wt.branch=${BRANCH_NAME}"

    # -------------------------------------------------------------------------
    # DO NOT EDIT — devcontainer-wt core environment
    # -------------------------------------------------------------------------
    env_file:
      - .env.app
    environment:
      - WORKTREE_NAME=${WORKTREE_NAME}
      - BRANCH_NAME=${BRANCH_NAME}
      - PROJECT_NAME=${PROJECT_NAME}
      - MAIN_REPO_NAME=${MAIN_REPO_NAME}

# =============================================================================
# CUSTOMIZE — Shared build caches (uncomment and adapt for your stack).
# Named volumes with a fixed `name:` are shared across all worktree containers.
# Share the package manager CACHE, not node_modules (platform-specific binaries).
# =============================================================================
#
#     # Add these under the `app.volumes` section above:
#     # - npm-cache:/home/node/.npm
#     # - go-mod-cache:/go/pkg/mod
#     # - pip-cache:/home/vscode/.cache/pip
#
# volumes:
#   npm-cache:
#     name: "${PROJECT_NAME}-npm-cache"
#   go-mod-cache:
#     name: "${PROJECT_NAME}-go-mod-cache"
#   pip-cache:
#     name: "${PROJECT_NAME}-pip-cache"
